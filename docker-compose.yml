version: '3.8'

services:
  fridge-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fridge-dashboard
    privileged: true
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # Set to "true" to show debug panel with raw Gemini response
      - DEBUG_MODE=${DEBUG_MODE:-false}
    restart: unless-stopped
